context: null

strings:
- labyrinth_description: |
    There is an initial cell and a goal cell.
    Cells are connected by adjacency relations.
    Rows and columns can be shifted, modifying the connections.
    The number of steps is bounded.

- nomystery_description: |
    Locations are connected by weighted edges.
    Being at a location and having a fuel amount are state properties.
    Traversing an edge consumes fuel according to its cost.
    All goal locations must be reached within the available fuel.

- ricochetrobots_description: |
    A grid has a fixed dimension.
    Robots occupy grid cells.
    Barriers block movement between cells.
    Movement in a direction continues until a barrier or robot is encountered.
    A target cell must be reached in a fixed number of moves.

- sokoban_description: |
    A warehouse grid contains a player and stones occupying floor cells.
    Movement is directional across adjacent locations.
    A stone can be pushed only if the next cell is clear.
    Goal stones must eventually be placed on designated storage (goal) cells.

    
extract:
- problem_name(name): 
    prompt: |
        Tell me the name of the problem that best match the text in INPUT.
        Choose from the following options: [labyrinth, nomystery, ricochetrobots, sokoban]
        
        
        Here is a description of each problem:
        
        labyrinth:
        {labyrinth_description}
        Predicates: field/2, init_on/2, goal_on/2, connect/3, max_steps/1
        
        
        nomystery:
        {nomystery_description}
        Predicates: fuelcost/3, at/2, fuel/2, goal/2, step/1
        
        
        ricochetrobots:
        {ricochetrobots_description}
        Predicates: dim/1, pos/3, barrier/3, target/3, length/1
        
        
        sokoban:
        {sokoban_description}
        Predicates: at/2, clear/2, isgoal/1, isnongoal/1, goal/1, player/1, steps/1, movedir/3
        

# Labirinth predicates
- size(value): 
    prompt: | 
        {labyrinth_description} 
        
        Identify the dimensions of the grid. 
        The "value" is the size of the quadratic grid of fields (an integer).
        
- init_on(x, y): 
    prompt: | 
        {labyrinth_description} 
        
        Identify the initial cell where the player or object starts. 
        Extract the position as two integer coordinates: "x" (horizontal/column) and "y" (vertical/row).

- goal_on(x, y): 
    prompt: | 
        {labyrinth_description} 
        
        Identify the goal or target cell that must be reached. 
        Extract the position as two integer coordinates: "x" and "y".

- connect(x, y, direction): 
    prompt: | 
        {labyrinth_description} 
        
        List all the connections between grid cells. 
        For each connection, identify the starting cell coordinates "x" and "y" (integers) and the "direction" of the move.
        
        The "direction" must be exactly one of these lowercase characters: n, s, e, or w.

- max_steps(value): 
    prompt: | 
        {labyrinth_description} 
        
        Identify the constraint on movement. 
        The "value" is the maximum number of steps or moves allowed to solve the labyrinth (an integer).


# Nomystery predicates
- at(object, location): 
    prompt: |
        {nomystery_description} 
        
        Identify the starting positions of all entities (trucks, packages, etc.).
        For each 'object', specify its initial 'location'.
    knowledge_base: |
        #show.
        #show at_nomystery(X,Y) : at(X,Y).
          
- fuel(truck, quantity): 
    prompt: |
        {nomystery_description} 
        
        Identify the starting fuel levels for all trucks.
        For each 'truck', specify the initial 'quantity' of fuel as an integer.

- fuelcost(cost, source, target): 
    prompt: |
        {nomystery_description} 
        
        Identify the connections between locations and how much fuel they consume.
        For each path, extract the 'source' (starting location), the 'target' (destination), and the 'cost' (the integer amount of fuel required).

- goal(package, location):
    prompt: |
        {nomystery_description} 
        
        Identify the delivery requirements for all packages.
        For each 'package', specify the final 'location' it must be delivered to.

- steps(value): 
    prompt: |
        {nomystery_description} 
        
        Identify the plan length or step limit.
        The "value" is the total number of steps or actions allowed to solve the problem (an integer).
    knowledge_base: |
        #show.  % rename to avoid name clashes
        #show steps_nomystery(X) : steps(X).



# Ricochet Robots predicates
- dim(value):
    prompt: |
        {ricochetrobots_description} 
        
        Identify the dimensions of the game board.
        The "value" is the size (dimension) of one side of the square board (an integer).

- pos(robot, x, y):
    prompt: |
        {ricochetrobots_description} 
        
        Identify the initial starting positions for all robots on the grid.
        For each robot, extract the 'robot' name (e.g., its color), and its 'x' and 'y' coordinates (integers).

- barrier(source_x, source_y, target_x, target_y, direction): 
    prompt: |
        {ricochetrobots_description} 
        
        Identify all barriers (walls) that block movement between adjacent cells. 
        For each barrier, specify the starting cell (source_x, source_y), the adjacent cell it blocks (target_x, target_y), and the "direction" of the barrier relative to the source.
        
        The "direction" must be one of these lowercase strings: north, south, east, west.

- target(robot, x, y):
    prompt: |
        {ricochetrobots_description} 
        
        Identify the goal objective of the puzzle.
        Specify which 'robot' (unquoted string) must reach which 'x' and 'y' position (integers).

- length(value): 
    prompt: |
        {ricochetrobots_description} 
        
        Identify the maximum move limit for the puzzle.
        The "value" is the total number of moves allowed in the final plan (an integer).


#sokoban predicates
- at(object, position):          
    prompt: |
        {sokoban_description} 
        
        Identify the starting locations of the movable elements.
        For each 'object' (either "sokoban" for the player or "stone" for a box), specify its initial 'position' cell name (e.g., pos_1_1).
    knowledge_base: |
        #show.
        #show at_sokoban(X,Y) : at(X,Y).
        
- clear(location):
    prompt: |
        {sokoban_description} 
        
        Identify all grid cells that are currently unoccupied.
        For each empty cell, provide the 'location' identifier (an unquoted string).

- isgoal(location): 
    prompt: |
        {sokoban_description} 
        
        Identify all target locations where stones must be placed.
        For each goal square, provide its 'location' identifier (an unquoted string).

- isnongoal(location): 
    prompt: |
        {sokoban_description} 
        
        Identify all floor locations that are NOT designated as goal squares.
        For each non-goal cell, provide its 'location' identifier (an unquoted string).

- goal(stone): 
    prompt: |
        {sokoban_description} 
        
        Identify which specific stones or boxes are required to be moved to goal positions.
        For each required stone, provide its identifier (an unquoted string).

- player(id): 
    prompt: |
        {sokoban_description} 
        
        Identify the unique identifier for the player character (the sokoban).
        The "id" is the name or string used to represent the person moving the stones.

- steps(value): 
    prompt: |
        {sokoban_description} 
        
        Identify the total number of actions allowed to solve the puzzle.
        The "value" is the step limit or maximum move count (an integer).
    knowledge_base: |
        #show.  % rename to avoid name clashes
        #show steps_sokoban(X) : steps(X).

- movedir(source, target, direction): 
    prompt: |
        {sokoban_description} 
        
        Define the adjacency and direction between all connected grid cells.
        For every pair of adjacent cells, specify the 'source' (starting cell), the 'target' (destination cell), and the 'direction' required to move from source to target.
        
        The 'direction' must be one of the following: dir_up, dir_down, dir_left, dir_right.


knowledge_base: |
        #show problem_name/1.

        % L
        field(X,Y) :- problem_name(labyrinth), size(N), X = 1..N, Y = 1..N.
        #show field/2.
        
        #show init_on(X,Y) : problem_name(labyrinth), init_on(X,Y).
        #show goal_on(X,Y) : problem_name(labyrinth), goal_on(X,Y).
        #show connect(X,Y,L) : problem_name(labyrinth), connect(X,Y,L).
        #show max_steps(X) : problem_name(labyrinth), max_steps(X).


        % N
        #show at(X,Y) : problem_name(nomystery), at_nomystery(X,Y).
        #show fuel(X,Y) : problem_name(nomystery), fuel(X,Y).
        #show fuelcost(X,Y,C) : problem_name(nomystery), fuelcost(X,Y,C).
        #show goal(X,Y) : problem_name(nomystery), goal(X,Y).
    
        step(1..N) :- problem_name(nomystery), steps_nomystery(N).
        #show step/1.
        
        
        % R
        dim(I-1) :- problem_name(ricochetrobots), dim(I), I > 1.
        #show dim(X) : dim(X), problem_name(ricochetrobots).
        

        #show pos(X,Y,Z) : problem_name(ricochetrobots), pos(X,Y,Z).
        

        barrier(X,Y,X',Y',Dir) :- problem_name(ricochetrobots), barrier(X',Y',X,Y,Dir).

        barrier(X,Y,Dir) :- problem_name(ricochetrobots), barrier(X,Y,X',Y',Dir), Dir == west,  (X',Y') == (X-1,Y).
        barrier(X,Y,Dir) :- problem_name(ricochetrobots), barrier(X,Y,X',Y',Dir), Dir == east,  (X',Y') == (X+1,Y).
        barrier(X,Y,Dir) :- problem_name(ricochetrobots), barrier(X,Y,X',Y',Dir), Dir == north, (X',Y') == (X,Y-1).
        barrier(X,Y,Dir) :- problem_name(ricochetrobots), barrier(X,Y,X',Y',Dir), Dir == south, (X',Y') == (X,Y+1).
        
        #show barrier(X,Y,Z) : barrier(X,Y,Z), problem_name(ricochetrobots).


        #show target(X,Y,Z) : problem_name(ricochetrobots), target(X,Y,Z).

        
        #show length(X) : problem_name(ricochetrobots), length(X).

        
        % S
        #show at(X,Y) : problem_name(sokoban), at_sokoban(X,Y).
        #show clear(X) : problem_name(sokoban), clear(X).
        #show isgoal(X) : problem_name(sokoban), isgoal(X).
        #show isnongoal(X) : problem_name(sokoban), isnongoal(X).
        #show goal(X) : problem_name(sokoban), goal(X).
        #show player(X) : problem_name(sokoban), player(X).

        step(I) :- problem_name(sokoban), steps_sokoban(N), I = 1..N.
        #show step/1.

        #show movedir(X,Y,Z) : problem_name(sokoban), movedir(X,Y,Z).
        
        
